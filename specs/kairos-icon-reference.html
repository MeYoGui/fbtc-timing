<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #1a1a1a; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
</style>
</head>
<body>
  <!-- KAIROS app icon — final reference. SVG, 192x192 rounded square, viewBox 0 0 160 148 -->
  <div style="width:192px; height:192px; border-radius:38px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#0d0d0d;">
    <svg width="160" height="160" viewBox="0 0 160 148" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#ff5252"/>
          <stop offset="45%"  stop-color="#ffd740"/>
          <stop offset="100%" stop-color="#00c853"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-i"><feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <polyline points="14,65 36,65 50,22 64,108 78,40 92,65 128,65"
        fill="none" stroke="url(#grad)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="128" cy="65" r="7" fill="#00c853" filter="url(#glow)"/>
      <text font-size="19" font-family="system-ui, sans-serif" font-weight="700">
        <tspan x="47"  y="140" fill="#ff6b3d">K</tspan>
        <tspan x="61"  y="140" fill="#ffa033">A</tspan>
        <tspan x="73"  y="140" fill="#ffd740" filter="url(#glow-i)">I</tspan>
        <tspan x="82"  y="140" fill="#80d94a">R</tspan>
        <tspan x="97"  y="140" fill="#00c853">O</tspan>
        <tspan x="112" y="140" fill="#00c853">S</tspan>
      </text>
    </svg>
  </div>
</body>
</html>
