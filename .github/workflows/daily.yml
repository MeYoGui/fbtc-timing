name: Daily Dashboard Update

on:
  schedule:
    # Cron is UTC and has no DST awareness, so the local time drifts by an hour
    # across the seasons: 13:00 UTC = 09:00 EDT (summer) / 08:00 EST (winter).
    - cron: '0 13 * * *'
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python scripts/fetch_data.py

      - run: python scripts/compute_signals.py

      - run: python scripts/score.py

      - run: python scripts/build_dashboard.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/index.html
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
